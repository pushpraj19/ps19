<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Local AI Trainer</title>

<style>
  body {
    margin: 0;
    font-family: Arial;
    background: #0b0f19;
    color: white;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* Header */
  .topbar {
    padding: 15px;
    text-align: center;
    background: #111827;
    font-weight: bold;
    border-bottom: 1px solid #222;
  }

  /* Chat area */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .msg {
    padding: 10px 14px;
    border-radius: 12px;
    max-width: 75%;
    white-space: pre-wrap;
  }

  .user {
    background: #2563eb;
    align-self: flex-end;
  }

  .ai {
    background: #1f2937;
    align-self: flex-start;
  }

  /* Input area */
  .input-box {
    display: flex;
    padding: 10px;
    border-top: 1px solid #222;
    background: #111827;
  }

  input {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 8px;
    outline: none;
    background: #1f2937;
    color: white;
  }

  button {
    margin-left: 10px;
    padding: 12px 16px;
    border: none;
    border-radius: 8px;
    background: #22c55e;
    cursor: pointer;
    font-weight: bold;
  }

  button:hover {
    background: #16a34a;
  }
</style>
</head>

<body>

<div class="topbar">🧠 Local English AI Trainer</div>

<div id="chat"></div>

<div class="input-box">
  <input id="msg" placeholder="Type English..." />
  <button onclick="send()">Send</button>
</div>

<script>
function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop = 999999;
}

function send() {
  let input = document.getElementById("msg");
  let text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");

  let reply = generateReply(text.toLowerCase());

  // small typing delay (feels like AI)
  setTimeout(() => {
    addMessage(reply, "ai");
  }, 500);

  input.value = "";
}

/* 🧠 YOUR LOCAL AI BRAIN */
function generateReply(text) {

  // grammar fixes
  if (text.includes("i go to school yesterday")) {
    return "❌ Correct: I went to school yesterday.\n💡 'Go' past tense = went.";
  }

  if (text.includes("i am agree")) {
    return "❌ Correct: I agree.\n💡 We don't use 'am' with agree.";
  }

  if (text.includes("hello")) {
    return "Hello 😏 Let's practice English. Try making a sentence.";
  }

  if (text.includes("how are you")) {
    return "I'm fine 😄 Now tell me something about your day.";
  }

  // default AI-style response
  return "Hmm interesting 😏\nTry rewriting this in better English or add more detail.";
}
</script>

</body>
</html>
