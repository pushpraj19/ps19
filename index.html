<!DOCTYPE html>
<html>
<head>
  <title>Local English AI</title>
  <style>
    body { font-family: Arial; background:#0f172a; color:white; text-align:center; }
    #chat { width:90%; max-width:600px; margin:auto; height:400px; overflow:auto; background:#020617; padding:10px; border-radius:10px; }
    input { width:60%; padding:10px; }
    button { padding:10px; }
  </style>
</head>
<body>

<h2>🧠 Offline English AI Trainer</h2>

<div id="chat"></div>

<input id="msg" placeholder="Type English..." />
<button onclick="send()">Send</button>

<script>
function send() {
  let msg = document.getElementById("msg").value;
  let chat = document.getElementById("chat");

  if (!msg) return;

  chat.innerHTML += "<p><b>You:</b> " + msg + "</p>";

  let reply = generateReply(msg.toLowerCase());

  chat.innerHTML += "<p><b>AI:</b> " + reply + "</p>";

  document.getElementById("msg").value = "";
}

function generateReply(text) {

  // 🔥 RULE 1: Grammar fixes (simple patterns)
  if (text.includes(" i ") && text.includes(" go ") && text.includes(" yesterday")) {
    return "❌ Correct: I went yesterday.\n💡 'Go' past tense is 'went'.";
  }

  if (text.includes("i am agree")) {
    return "❌ Correct: I agree.\n💡 We don't say 'am agree'.";
  }

  if (text.includes("how are you")) {
    return "I'm fine 😏 How about you?";
  }

  if (text.includes("hello")) {
    return "Hello! Let's practice English together 😄";
  }

  // 🔥 DEFAULT RESPONSE (AI-like behavior)
  return "Interesting sentence 😏 Try rewriting it in better English.";
}
</script>

</body>
</html>
