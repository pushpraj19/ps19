<!DOCTYPE html>
<html>
<head>
  <title>English AI Trainer</title>
  <style>
    body { font-family: Arial; background:#0f172a; color:white; text-align:center; }
    #chat { width:90%; max-width:600px; margin:auto; height:400px; overflow:auto; background:#020617; padding:10px; border-radius:10px; }
    input { width:60%; padding:10px; }
    button { padding:10px; }
  </style>
</head>
<body>

<h2>🧠 English AI Trainer</h2>

<div id="chat"></div>

<input id="msg" placeholder="Type English..." />
<button onclick="send()">Send</button>

<script>
async function send() {
  let msg = document.getElementById("msg").value;
  let chat = document.getElementById("chat");

  chat.innerHTML += "<p><b>You:</b> " + msg + "</p>";

  let res = await fetch("/api/chat", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ message: msg })
  });

  let data = await res.json();

  chat.innerHTML += "<p><b>AI:</b> " + data.reply + "</p>";
}
</script>

</body>
</html>
